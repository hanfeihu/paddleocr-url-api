name: build-windows-x64

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "**/*.py"
      - "requirements.txt"
      - "windows/**"
      - ".github/workflows/windows-build.yml"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x64"

      - name: Install deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe (PyInstaller)
        shell: pwsh
        run: |
          # Avoid slow model hoster connectivity checks during import-time hooks.
          $env:PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK = "True"
          pyinstaller --noconfirm --clean windows\pyinstaller.spec

      - name: Download WinSW x64
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path windows\winsw | Out-Null
          $url = "https://github.com/winsw/winsw/releases/download/v2.12.0/WinSW-x64.exe"
          Invoke-WebRequest -Uri $url -OutFile windows\winsw\ocr-url-api-service.exe

      - name: Collect service files into dist
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File windows\collect-dist.ps1

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File windows\build-installer.ps1

      - name: Zip artifact
        shell: pwsh
        run: |
          if (Test-Path dist\ocr-url-api.zip) { Remove-Item -Force dist\ocr-url-api.zip }
          Compress-Archive -Path dist\ocr-url-api\* -DestinationPath dist\ocr-url-api.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ocr-url-api-windows-x64
          path: dist/ocr-url-api.zip

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ocr-url-api-windows-installer-x64
          path: dist/ocr-url-api-setup-1.0.10.exe
